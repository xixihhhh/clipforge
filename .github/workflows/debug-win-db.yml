# 临时调试工作流：验证 issue #12 修复 —— 用当前分支代码在 Windows 真实构建安装包，
# 解包后用 Electron-as-Node 拉起 standalone 服务，请求 DB 路由确认不再 500
name: Debug Win DB Repro

on:
  push:
    branches: ["debug/win-db-repro"]

jobs:
  build-and-verify:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建 Windows 安装包（含修复后的 bundle-standalone）
        run: pnpm dist

      - name: 解包刚构建的安装程序
        shell: pwsh
        run: |
          $exe = (Get-ChildItem release/*.exe | Select-Object -First 1).FullName
          Write-Host "安装包: $exe"
          7z x -y -oexe "$exe" | Out-Null
          7z x -y -oapp 'exe/$PLUGINSDIR/app-64.7z' | Out-Null

      - name: 校验 .next 内 better-sqlite3 副本已是 Electron ABI
        shell: pwsh
        run: |
          $env:ELECTRON_RUN_AS_NODE = "1"
          $copies = Get-ChildItem -Recurse -Path app/resources/standalone -Filter better_sqlite3.node | ForEach-Object FullName
          Write-Host "找到 $($copies.Count) 份 better_sqlite3.node:"
          $copies | ForEach-Object { Write-Host "  $_  $(Get-FileHash $_ -Algorithm SHA256 | Select-Object -ExpandProperty Hash)" }

      - name: 启动 standalone 服务并请求 /api/project
        shell: pwsh
        run: |
          $st = (Resolve-Path 'app/resources/standalone').Path
          $data = Join-Path $env:RUNNER_TEMP 'clipforge-data'
          New-Item -ItemType Directory -Force -Path $data | Out-Null
          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = (Resolve-Path 'app/ClipForge.exe').Path
          $psi.Arguments = '"' + (Join-Path $st 'server.js') + '"'
          $psi.WorkingDirectory = $st
          $psi.UseShellExecute = $false
          $psi.RedirectStandardOutput = $true
          $psi.RedirectStandardError = $true
          $psi.EnvironmentVariables['ELECTRON_RUN_AS_NODE'] = '1'
          $psi.EnvironmentVariables['NODE_ENV'] = 'production'
          $psi.EnvironmentVariables['PORT'] = '8399'
          $psi.EnvironmentVariables['HOSTNAME'] = '127.0.0.1'
          $psi.EnvironmentVariables['APP_DATA_DIR'] = $data
          $psi.EnvironmentVariables['APP_MIGRATIONS_DIR'] = (Join-Path $st 'drizzle')
          $proc = [System.Diagnostics.Process]::Start($psi)
          Start-Sleep -Seconds 10
          $fail = $false
          Write-Host '=== GET /api/project ==='
          try { $r = Invoke-WebRequest -Uri 'http://127.0.0.1:8399/api/project' -UseBasicParsing; Write-Host $r.StatusCode $r.Content } catch { $fail = $true; Write-Host 'GET 失败:' $_.Exception.Response.StatusCode.value__; if ($_.ErrorDetails) { Write-Host $_.ErrorDetails.Message } }
          Write-Host '=== POST /api/project ==='
          $body = '{"name":"win验证","productName":"测试品","productCategory":"other","productDescription":"x","productImages":[]}'
          try { $r = Invoke-WebRequest -Uri 'http://127.0.0.1:8399/api/project' -Method POST -ContentType 'application/json' -Body $body -UseBasicParsing; Write-Host $r.StatusCode $r.Content } catch { $fail = $true; Write-Host 'POST 失败:' $_.Exception.Response.StatusCode.value__; if ($_.ErrorDetails) { Write-Host $_.ErrorDetails.Message } }
          Stop-Process -Id $proc.Id -Force -ErrorAction SilentlyContinue
          Write-Host '=== 服务端输出 ==='
          Write-Host $proc.StandardOutput.ReadToEnd()
          Write-Host '=== 服务端错误输出 ==='
          Write-Host $proc.StandardError.ReadToEnd()
          if ($fail) { throw 'DB 路由仍然失败' }
