# 发版流水线：push 形如 vX.Y.Z 的 tag 时，在 mac + windows runner 上分别打桌面安装包，
# 并把 .dmg / .exe 上传到对应的 GitHub Release（即"别人一键下载即用"）；
# 另出一份 clipforge-skill.zip（zip 根即 skill 文件夹，可直接上传 claude.ai 的 Skills 面板）。
name: Release Desktop

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # 创建 Release / 上传产物需要

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false # 一个平台失败不影响另一个平台继续出包
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4

      - name: 配置 Node 22（启用 pnpm 缓存）
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 注意：这里【不】跳过 electron 二进制下载——打包需要它
      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 打包桌面安装包（mac=.dmg / win=.exe）
        run: pnpm dist

      - name: 上传安装包到 Release（草稿，审核产物后再发布）
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.exe
          fail_on_unmatched_files: false
          draft: true
          # 双语发布说明（中文优先 + 英文），国际化友好；品牌统一为 ClipForge、数据目录与 build.productName 一致
          body: |
            ClipForge 桌面版 —— 双击即用，内置 ffmpeg / sqlite，无需安装 Node。

            - **macOS (Apple Silicon)**：下载 `.dmg`。未签名，首次打开右键「打开」绕过 Gatekeeper。
            - **Windows (x64)**：下载 `.exe` 安装。⚠️ Windows 版为自动构建、未经实测，欢迎反馈。

            首次启动后数据存于系统用户目录（macOS：`~/Library/Application Support/ClipForge`）。

            ---

            ClipForge Desktop — double-click to run. FFmpeg / SQLite bundled, no Node install required.

            - **macOS (Apple Silicon)**: download the `.dmg`. Unsigned — on first launch, right-click → "Open" to bypass Gatekeeper.
            - **Windows (x64)**: download the `.exe` installer. ⚠️ The Windows build is auto-generated and untested — feedback welcome.

            On first launch, app data is stored under your user directory (macOS: `~/Library/Application Support/ClipForge`).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Agent-skill bundle for claude.ai: the zip root must be the skill folder itself
  # (clipforge-video/SKILL.md), matching claude.ai's upload requirement.
  skill-bundle:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打包 agent skill（clipforge-skill.zip）
        run: cd skills && zip -r ../clipforge-skill.zip clipforge-video

      - name: 上传 skill zip 到 Release
        uses: softprops/action-gh-release@v2
        with:
          files: clipforge-skill.zip
          fail_on_unmatched_files: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
